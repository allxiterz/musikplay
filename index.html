<!DOCTYPE html>
<html>
<head>
<title>Music App Neon Chill Menu</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:#0ff;
  background:#000;
  overflow:hidden;
}

.page{
  display:none;
  height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
}

.active{
  display:flex;
}

/* Background neon gelap */
.bg-page{
  position:absolute;
  width:100%;
  height:100%;
  background-color:#000;
  background-image:
    radial-gradient(circle at 25% 25%, rgba(0,255,255,0.02) 0%, transparent 50%),
    radial-gradient(circle at 75% 75%, rgba(255,0,255,0.02) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,0,0.02) 0%, transparent 50%);
  background-size:200% 200%;
  animation:neonBG 15s linear infinite;
  z-index:-1;
  filter:blur(12px);
}

@keyframes neonBG{
  0%{background-position:0% 0%, 100% 100%, 50% 50%;}
  50%{background-position:100% 0%, 0% 100%, 50% 50%;}
  100%{background-position:0% 0%, 100% 100%, 50% 50%;}
}

.menu h1{
  text-align:center;
  margin-top:40px;
  font-size:2em;
  text-shadow:0 0 8px #0ff, 0 0 12px #0ff;
}

.song-list{
  width:350px;
  margin-top:30px;
}

.song-item{
  background:rgba(0,0,0,0.7);
  margin:15px 0;
  padding:15px;
  border-radius:12px;
  display:flex;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 8px #0ff;
}

.song-item:hover{
  transform:scale(1.03);
  box-shadow:0 0 12px #0ff;
}

.song-item img{
  width:55px;
  height:55px;
  border-radius:10px;
  margin-right:15px;
  object-fit:cover;
  border:1px solid #0ff;
  box-shadow:0 0 5px #0ff;
}

.player{
  position:relative;
}

.card{
  background:rgba(0,0,0,0.7);
  padding:25px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 0 12px #0ff;
}

.card img{
  width:150px;
  height:150px;
  border-radius:15px;
  object-fit:cover;
  margin-bottom:15px;
  border:1px solid #0ff;
  box-shadow:0 0 8px #0ff;
}

button{
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:6px;
  background:#0ff;
  color:black;
  cursor:pointer;
  box-shadow:0 0 8px #0ff;
}

button:hover{
  background:#f0f;
  color:white;
  box-shadow:0 0 12px #f0f;
}

.contact-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  background:#0ff;
  color:black;
  font-weight:bold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  z-index:100;
  box-shadow:0 0 8px #0ff;
  transition:0.3s;
  text-decoration:none;
}
